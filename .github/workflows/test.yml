name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Lint with flake8
        run: |
          flake8 backend/ data_pipeline/ tests/ --max-line-length=100 > flake8_output.txt || true
          if [ -s flake8_output.txt ]; then
            jq -R -s '{error: .}' flake8_output.txt > payload.json
            curl -X POST -H "Content-Type: application/json" -d @payload.json https://f1-telemetry-api.onrender.com/api/v1/predict/debug-log || true
          fi
          flake8 backend/ data_pipeline/ tests/ --max-line-length=100

      - name: Run offline unit tests
        env:
          DATABASE_URL: "sqlite:///test_f1.db"
          LOG_LEVEL: "WARNING"
          TELEMETRY_SAMPLE_RATE: "5"
        run: |
          pytest tests/ -v -m "not integration" --tb=short
